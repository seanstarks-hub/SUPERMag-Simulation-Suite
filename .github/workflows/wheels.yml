name: Build Wheels

on:
  push:
    tags:
      - "v*"

jobs:
  build-wheel:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build C++ library
        run: |
          mkdir build\obj\src\common
          mkdir build\obj\src\proximity
          mkdir build\obj\src\linalg
          mkdir build\obj\src\solvers
          mkdir build\test
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\common\error.obj cpp\src\common\error.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\common\constants.obj cpp\src\common\constants.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\common\digamma.obj cpp\src\common\digamma.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\common\allocator.obj cpp\src\common\allocator.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\proximity\pair_amplitude.obj cpp\src\proximity\pair_amplitude.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\proximity\critical_temp.obj cpp\src\proximity\critical_temp.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\proximity\kernels.obj cpp\src\proximity\kernels.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\proximity\depairing.obj cpp\src\proximity\depairing.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\linalg\tridiag.obj cpp\src\linalg\tridiag.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\linalg\simd_kernels.obj cpp\src\linalg\simd_kernels.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\linalg\eigen.obj cpp\src\linalg\eigen.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\usadel.obj cpp\src\solvers\usadel.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\eilenberger.obj cpp\src\solvers\eilenberger.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\bdg.obj cpp\src\solvers\bdg.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\ginzburg_landau.obj cpp\src\solvers\ginzburg_landau.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\josephson.obj cpp\src\solvers\josephson.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\triplet.obj cpp\src\solvers\triplet.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\root_scalar.obj cpp\src\solvers\root_scalar.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /I cpp/src /c /Fobuild\obj\src\solvers\determinant.obj cpp\src\solvers\determinant.cpp
          lib /OUT:build\supermag.lib build\obj\src\common\error.obj build\obj\src\common\constants.obj build\obj\src\common\digamma.obj build\obj\src\common\allocator.obj build\obj\src\proximity\pair_amplitude.obj build\obj\src\proximity\critical_temp.obj build\obj\src\proximity\kernels.obj build\obj\src\proximity\depairing.obj build\obj\src\linalg\tridiag.obj build\obj\src\linalg\simd_kernels.obj build\obj\src\linalg\eigen.obj build\obj\src\solvers\usadel.obj build\obj\src\solvers\eilenberger.obj build\obj\src\solvers\bdg.obj build\obj\src\solvers\ginzburg_landau.obj build\obj\src\solvers\josephson.obj build\obj\src\solvers\triplet.obj build\obj\src\solvers\root_scalar.obj build\obj\src\solvers\determinant.obj

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheel
        run: python -m cibuildwheel --output-dir wheelhouse python/
        env:
          CIBW_BUILD: "cp311-win_amd64"
          CIBW_ARCHS_WINDOWS: "AMD64"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: wheelhouse/*.whl
