name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build C++ library
        run: |
          mkdir build\obj\src\common build\obj\src\proximity build\obj\src\linalg build\obj\src\solvers build\test
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\common\error.obj cpp\src\common\error.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\common\constants.obj cpp\src\common\constants.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\proximity\pair_amplitude.obj cpp\src\proximity\pair_amplitude.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\proximity\critical_temp.obj cpp\src\proximity\critical_temp.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\linalg\tridiag.obj cpp\src\linalg\tridiag.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\linalg\simd_kernels.obj cpp\src\linalg\simd_kernels.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\usadel.obj cpp\src\solvers\usadel.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\eilenberger.obj cpp\src\solvers\eilenberger.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\bdg.obj cpp\src\solvers\bdg.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\ginzburg_landau.obj cpp\src\solvers\ginzburg_landau.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\josephson.obj cpp\src\solvers\josephson.cpp
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /c /Fobuild\obj\src\solvers\triplet.obj cpp\src\solvers\triplet.cpp
          lib /OUT:build\supermag.lib build\obj\src\common\error.obj build\obj\src\common\constants.obj build\obj\src\proximity\pair_amplitude.obj build\obj\src\proximity\critical_temp.obj build\obj\src\linalg\tridiag.obj build\obj\src\linalg\simd_kernels.obj build\obj\src\solvers\usadel.obj build\obj\src\solvers\eilenberger.obj build\obj\src\solvers\bdg.obj build\obj\src\solvers\ginzburg_landau.obj build\obj\src\solvers\josephson.obj build\obj\src\solvers\triplet.obj

      - name: Run C++ tests
        run: |
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /Febuild\test\test_proximity.exe cpp\test\test_proximity.cpp build\supermag.lib
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /Febuild\test\test_tridiag.exe cpp\test\test_tridiag.cpp build\supermag.lib
          cl /std:c++17 /O2 /arch:AVX2 /EHsc /W4 /I cpp/include /Febuild\test\test_stubs.exe cpp\test\test_stubs.cpp build\supermag.lib
          build\test\test_proximity.exe
          build\test\test_tridiag.exe
          build\test\test_stubs.exe

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pytest

      - name: Run pytest
        run: python -m pytest python/tests/ -v
