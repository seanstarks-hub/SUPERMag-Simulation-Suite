name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core pybind11 cmake numpy matplotlib pytest scipy

      - name: Build C++ via CMake
        run: |
          cmake -B build -S python -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run C++ tests
        run: |
          mkdir -p build/test
          for src in cpp/test/test_*.cpp; do
            name=$(basename $src .cpp)
            g++ -std=c++17 -O2 -I cpp/include -I cpp/src -o build/test/$name $src -Lbuild -lsupermag_core -lm
            echo "--- $name ---"
            build/test/$name
          done
          echo "All C++ tests passed."

      - name: Install Python package
        run: pip install ./python

      - name: Run pytest
        run: python -m pytest python/tests/ -v

  ocaml-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.1"

      - name: Install opam dependencies
        run: |
          opam install ctypes ctypes-foreign cmdliner alcotest --yes

      - name: Build C++ shared library
        run: make shared

      - name: Build OCaml project
        run: cd ocaml && opam exec -- dune build

      - name: Run OCaml tests
        run: cd ocaml && opam exec -- dune runtest
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build
